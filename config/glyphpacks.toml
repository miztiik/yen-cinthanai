# Glyph pack labels. Human-edited. Six packs: household, creatures, abstract, shapes,
# food, colour (each value pack ships 6 values so Sharp 5x4 / Expert 6x5 fill, D17).
# Labels ONLY - the file map lives in frontend/public/assets/glyphs/index.json, file
# path derived from the registry. See docs/concepts/ui-shell.md (assets convention).
# Contract: every id here has a registry entry; no hardcoded paths (CLAUDE.md #6).

