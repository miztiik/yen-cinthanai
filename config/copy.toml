# Spoiler-free share card text. Stats only (tier, stars, time, wrong, hints, streak);
# never a placement. {token} fields filled by src/contracts/share.ts. ASCII.
[share]
title = "yen-cinthanai {tier}"
line = "{stars} {time}s w{wrong} h{hints}"
streak = "flame {streak}"

