# Save retention + streak forgiveness. Contract: docs/architecture/contracts/schemas.md.
# Richness-first: keep days while storage allows; prune oldest only under pressure.

[prune]
oldest_first = true
protect_today = true
trigger = "quota-exceeded"

[streak]
skips_per_week = 1
refill_weekday = "monday"
reset_utc_hour = 0

# Stuck-moment pacing (difficulty-and-scoring.md). Idle nudges, never a sell or a
# timer-wall: pulse a token, then glow the clue. stats_window = sparkline length.
[pace]
idle_pulse_s = 12
idle_glow_s = 25
stats_window = 10
