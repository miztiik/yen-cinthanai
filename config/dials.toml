# Generator dials. Build-time tunables for tools/generate.py. No hardcoding in code
# (CLAUDE.md #6). Contract: docs/architecture/generator/pipeline.md, 6b/6c.
# seed_salt feeds sha256(salt + date + ":" + tier) -> PRNG + CP-SAT random_seed.
# templateRev pins the clueText template registry below; bump on any wording change.

seed_salt = "yen-cinthanai-v1"
template_rev = 1
max_reseeds = 64

# Clue-type selection weights. Harder tiers favour indirect (relational) types.
# direct = eq, ends; indirect = neq, adjacent, distance, before, opposite, between.
[weights]
eq = 4
ends = 4
neq = 2
adjacent = 4
distance = 2
before = 3
opposite = 5
between = 4

# Tier -> shape + how many value dimensions to draw. The generator (tools/generate.py
# build_categories) AUTO-DISCOVERS packs from the glyph manifest and date-seeds which
# folders + which values fill these slots, so a new collection folder joins the rotation
# with NO code change - diversity comes from the full pool, not a fixed list. `nominal` =
# bijective value packs (one distinct value per seat); `shared` = binary packs (2 values
# repeat across seats). The ordinal seat axis (abstract numerals) is added automatically
# when the shape has one (seating-row, round-table); the structural `abstract` pack is
# never itself a value dimension. easy=grid 3x2; standard=seating 4x3 (+1 shared);
# sharp=seating 5x4; expert=round-table 6x5.
[tier.easy]
shape = "grid"
nominal = 2
shared = 0
[tier.standard]
shape = "seating-row"
nominal = 2
shared = 1
[tier.sharp]
shape = "seating-row"
nominal = 3
shared = 0
[tier.expert]
shape = "round-table"
nominal = 4
shared = 0
