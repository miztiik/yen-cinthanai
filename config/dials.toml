# Generator dials. Build-time tunables for tools/generate.py. No hardcoding in code
# (CLAUDE.md #6). Contract: docs/architecture/generator/pipeline.md, 6b/6c.
# seed_salt feeds sha256(salt + date + ":" + tier) -> PRNG + CP-SAT random_seed.
# templateRev pins the clueText template registry below; bump on any wording change.

seed_salt = "yen-cinthanai-v1"
template_rev = 1
max_reseeds = 64

# Clue-type selection weights. Harder tiers favour indirect (relational) types.
# direct = eq, ends; indirect = neq, adjacent, distance, before, opposite, between.
[weights]
eq = 4
ends = 4
neq = 2
adjacent = 4
distance = 2
before = 3
opposite = 5
between = 4

# Categories: id -> label, glyph pack, ordinal axis, cardinality. Values + labels come
# from the pack (frontend/public/assets/glyphs/index.json + config/glyphpacks.toml).
# cardinality=shared (default bijective) repeats `values` across slots (pool refills).
[category.drink]
label = "Drink"
pack = "household"
ordinal = false
[category.animal]
label = "Animal"
pack = "creatures"
ordinal = false
[category.position]
label = "Seat"
pack = "abstract"
ordinal = true
[category.shape]
label = "Shape"
pack = "shapes"
ordinal = false
[category.team]
label = "Team"
pack = "shapes"
ordinal = false
cardinality = "shared"
values = 2

# Tier -> shape + ordered categories. easy=grid 3x2; standard=seating 4x3 +1 shared
# team; sharp=seating 4x3; expert=round-table 4 seats (wrap/opposite/between). Mixed
# cardinality + round-table land here (D4 + round-table v2). bijective stays default.
[tier.easy]
shape = "grid"
categories = ["drink", "animal"]
[tier.standard]
shape = "seating-row"
categories = ["drink", "animal", "position", "team"]
[tier.sharp]
shape = "seating-row"
categories = ["drink", "animal", "position"]
[tier.expert]
shape = "round-table"
categories = ["drink", "animal", "position"]
