# Perf budgets. Richness-first: NO fixed byte cap (CLAUDE.md Holy Law #2).
# Optimize only if the target device drops below these. Measured under throttle.

[device]
profile = "mid-tier-android"
cpu_throttle = 4
network = "slow-4g"

[targets]
fps = 60
input_to_photon_ms = 50
first_interaction_ms = 2000
byte_cap = false
