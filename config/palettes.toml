surface = "#2c2018"
ink = "#f5ece2"
accent = "#f97316"
satisfy = "#84cc16"
violate = "#ef4444"
near = "#f59e0b"
gold = "#fbbf24"
[palette.ember.light]
bg = "#fbf6f0"
surface = "#fffaf4"
ink = "#2a1c12"
accent = "#ea580c"
satisfy = "#4d7c0f"
