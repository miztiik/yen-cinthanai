# Tier presets over the difficulty dials. Contract: docs/concepts/difficulty-and-scoring.md.
# attempts/hints: -1 = unlimited. band = [min, max] inclusive D score. par_s = seconds.

[easy]
band = [0, 13]
entities = 3
categories = 2
clue_count = [3, 4]
indir = [0.0, 0.0]
cardinality = "bijective"
attempts = -1
hints = -1
feedback = "realtime-names"
par_s = 90

[standard]
band = [14, 39]
entities = 4
categories = 3
clue_count = [5, 7]
indir = [0.25, 0.40]
cardinality = "shared"
attempts = 3
hints = 2
feedback = "count-wrong"
par_s = 240

# Sharp 5x4 and Expert 6x5 land now that every value pack ships 6 values (D17:
# household/creatures/food/colour + the abstract numerals). SIZE = entities*categories
# climbs with the grid, so D sits structurally higher: Sharp ~57 (size+depth driven,
# mostly direct eq/ends clues), Expert ~108 (the round-table's wrap relations are all
# indirect, so INDIR maxes out). The ENV dials still separate the two. Bands bracket
# the observed D with margin; they are the calibration gate. See difficulty-and-scoring.md.
[sharp]
band = [48, 66]
entities = 5
categories = 4
clue_count = [9, 11]
indir = [0.0, 0.20]
cardinality = "bijective"
attempts = 2
hints = 1
feedback = "binary-check"
par_s = 480

[expert]
band = [96, 120]
entities = 6
categories = 5
clue_count = [14, 16]
indir = [0.80, 1.0]
cardinality = "bijective"
attempts = 1
hints = 0
feedback = "submit-binary"
par_s = 900
