name: deploy

# Build today's bank, bake config, and publish the static bundle to GitHub Pages.
# Static-first: no runtime backend. base = /yen-cinthanai/. See docs/how-to/
# ship-to-github-pages.md and docs/architecture/runtime/stack-and-bundle.md.
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: pip install -r tools/requirements.txt
      - run: python -m tools.generate --date today
      - run: python -m tools.bake_config
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
        env:
          GH_PAGES_BASE: /yen-cinthanai/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
