name: daily

# Once a day, backfill the last 7 days x four tiers (rolling archive, add-only, never
# future) and commit the fresh bank back to master. The deploy workflow then publishes
# it. See docs/architecture/generator/pipeline.md and docs/how-to/ship-to-github-pages.md.
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r tools/requirements.txt
      - run: python -m tools.generate --backfill 7 --tiers easy,standard,sharp,expert
      - name: commit bank
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/puzzles
          if git diff --cached --quiet; then
            echo "no bank changes"
          else
            git commit -m "chore(bank): daily puzzle generation"
            git push
          fi
